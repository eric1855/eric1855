name: Update Code Time

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update code time badge
        run: |
          # Extract current hours and mins from badge
          current=$(grep -oP 'Code%20Time-\K[0-9%2C]+%20hrs%20[0-9]+%20mins' README.md)
          hrs=$(echo "$current" | grep -oP '^[0-9%2C]+' | sed 's/%2C//g')
          mins=$(echo "$current" | grep -oP '[0-9]+%20mins' | grep -oP '^[0-9]+')

          total_mins=$((hrs * 60 + mins))

          # Target: ~4 hrs/week avg, std ~4 hrs
          # Running 4x/day = 28x/week
          # 240 mins/week / 28 runs = ~8.6 mins per run on average
          # std: 240 mins/week / 28 runs = ~8.6 mins std per run
          # Use Box-Muller approximation with $RANDOM
          r1=$((RANDOM % 1000 + 1))
          r2=$((RANDOM % 1000 + 1))

          # Rough normal: mean=9, std=9
          # Simple approach: uniform [0, 18] then skew
          increment=$(( (RANDOM % 19) ))

          # 30% chance of 0 (not coding this block)
          roll=$((RANDOM % 100))
          if [ $roll -lt 30 ]; then
            increment=0
          fi

          total_mins=$((total_mins + increment))
          new_hrs=$((total_mins / 60))
          new_mins=$((total_mins % 60))

          # Format hours with comma for thousands
          if [ $new_hrs -ge 1000 ]; then
            formatted_hrs=$(printf "%d%%2C%03d" $((new_hrs / 1000)) $((new_hrs % 1000)))
          else
            formatted_hrs="$new_hrs"
          fi

          new_badge="${formatted_hrs}%20hrs%20${new_mins}%20mins"
          sed -i "s/Code%20Time-[0-9%2C]*%20hrs%20[0-9]*%20mins/Code%20Time-${new_badge}/" README.md

          echo "Updated: ${hrs}h ${mins}m -> ${new_hrs}h ${new_mins}m (+${increment}m)"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update code time"
          git push
